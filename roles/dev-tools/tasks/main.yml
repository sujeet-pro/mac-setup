---
- name: Install fzf key bindings
  ansible.builtin.command:
    cmd: "{{ brew_prefix.stdout }}/opt/fzf/install --key-bindings --completion --no-update-rc"
    creates: "{{ home_dir }}/.fzf.zsh"
  tags: [dev-tools, fzf]

- name: Create ~/personal directory
  ansible.builtin.file:
    path: "{{ home_dir }}/personal"
    state: directory
    mode: "0755"
  tags: [dev-tools, directories]

- name: Create ~/work directory
  ansible.builtin.file:
    path: "{{ home_dir }}/work"
    state: directory
    mode: "0755"
  tags: [dev-tools, directories]

- name: Ensure ~/.colima directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.colima"
    state: directory
    mode: "0755"
  tags: [dev-tools, colima]

- name: Symlink Colima default profile
  ansible.builtin.file:
    src: "{{ repo_dir }}/configs/colima/default.yaml"
    dest: "{{ home_dir }}/.colima/default.yaml"
    state: link
    force: true
  tags: [dev-tools, colima]
