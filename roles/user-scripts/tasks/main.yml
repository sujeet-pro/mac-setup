---
# Symlinks user_scripts/userscripts → ~/.local/bin/userscripts.
#
# This is the single entry point for every script under user_scripts/.
# Subdirectories with `index.sh` or `index.py` are exposed as namespaces:
#   userscripts <namespace> [args ...]
# See user_scripts/userscripts --help.

- name: Ensure ~/.local/bin directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.local/bin"
    state: directory
    mode: "0755"
  tags: [user-scripts]

- name: Symlink the userscripts dispatcher into ~/.local/bin
  ansible.builtin.file:
    src: "{{ repo_dir }}/user_scripts/userscripts"
    dest: "{{ home_dir }}/.local/bin/userscripts"
    state: link
    force: true
  tags: [user-scripts]

- name: Remove obsolete bare bins (now invoked via `userscripts <name>`)
  ansible.builtin.file:
    path: "{{ home_dir }}/.local/bin/{{ item }}"
    state: absent
  loop:
    - git-rewrite-emails
    - git-status-all
  tags: [user-scripts]
