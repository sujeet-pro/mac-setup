---
- name: Ensure ~/.config/mise directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/mise"
    state: directory
    mode: "0755"
  tags: [mise, config]

- name: Symlink mise config
  ansible.builtin.file:
    src: "{{ repo_dir }}/configs/mise/config.toml"
    dest: "{{ home_dir }}/.config/mise/config.toml"
    state: link
    force: true
  tags: [mise, config]

- name: Trust managed mise config files
  ansible.builtin.command:
    cmd: "{{ brew_prefix.stdout }}/bin/mise trust {{ item }}"
  loop:
    - "{{ home_dir }}/.config/mise/config.toml"
    - "{{ repo_dir }}/configs/mise/config.toml"
  changed_when: false
  tags: [mise, config]

- name: Install global runtimes and SDKs via mise
  ansible.builtin.command:
    cmd: "{{ brew_prefix.stdout }}/bin/mise install"
  environment:
    MISE_GLOBAL_CONFIG_FILE: "{{ home_dir }}/.config/mise/config.toml"
  changed_when: false
  tags: [mise, install]

- name: Regenerate mise shims for all installed tools
  ansible.builtin.command:
    cmd: "{{ brew_prefix.stdout }}/bin/mise reshim"
  environment:
    MISE_GLOBAL_CONFIG_FILE: "{{ home_dir }}/.config/mise/config.toml"
  changed_when: false
  tags: [mise, install]

- name: Install global npm packages via mise-managed Node
  ansible.builtin.command:
    cmd: "{{ brew_prefix.stdout }}/bin/mise exec -- npm install -g {{ item }}"
  environment:
    MISE_GLOBAL_CONFIG_FILE: "{{ home_dir }}/.config/mise/config.toml"
  loop: "{{ npm_global_packages }}"
  changed_when: false
  tags: [mise, npm, install]
