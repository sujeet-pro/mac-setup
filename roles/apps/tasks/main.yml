---
# --- VS Code ---

- name: Ensure VS Code settings directory exists
  ansible.builtin.file:
    path: "{{ vscode_settings_dir }}"
    state: directory
    mode: "0755"
  tags: [apps, vscode]

- name: Symlink VS Code settings.json
  ansible.builtin.file:
    src: "{{ repo_dir }}/configs/vscode/settings.json"
    dest: "{{ vscode_settings_dir }}/settings.json"
    state: link
    force: true
  tags: [apps, vscode]

- name: Install VS Code extensions
  ansible.builtin.command:
    cmd: "code --install-extension {{ item }}"
  loop: "{{ vscode_extensions }}"
  register: vscode_ext_result
  changed_when: "'was successfully installed' in vscode_ext_result.stdout"
  failed_when: false
  tags: [apps, vscode, extensions]

# --- GitHub CLI ---

- name: Ensure .config/gh directory exists
  ansible.builtin.file:
