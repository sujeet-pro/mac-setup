# --- Raycast Script Commands ---

- name: Ensure Raycast script commands directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/raycast/script-commands"
    state: directory
    mode: "0755"
  tags: [apps, raycast]

- name: Find Raycast script commands in repo
  ansible.builtin.find:
    paths: "{{ repo_dir }}/configs/raycast/script-commands"
    patterns: ["*.sh", "*.applescript", "*.py", "*.js"]
  register: raycast_scripts
  tags: [apps, raycast]

- name: Symlink Raycast script commands
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ home_dir }}/.config/raycast/script-commands/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ raycast_scripts.files }}"
  tags: [apps, raycast]

- name: Remind user to add script commands directory in Raycast
  ansible.builtin.debug:
    msg: >
      Raycast Script Commands have been symlinked to ~/.config/raycast/script-commands/.
      If not already done, add this directory in Raycast:
      Extensions > Script Commands > Add Script Directory > ~/.config/raycast/script-commands
  tags: [apps, raycast]

# --- btop ---

