---
# Homebrew CLI tools (formulae)
homebrew_formulae:
  # Core shell & prompt
  - zsh
  - zsh-autosuggestions
  - zsh-completions
  - zsh-syntax-highlighting
  - starship
  - fzf
  - git
  - git-filter-repo

  # GNU userland (macOS catch-up — installed as g-prefixed: gls, gcp, gsed, ...)
  - coreutils
  - findutils
  - gawk
  - gnu-sed
  - gnu-tar
  - grep

  # Modern CLI replacements
  - bat
  - eza
  - fd
  - ripgrep
  - tlrc
  - zoxide

  # Dev tools
  - actionlint
  - btop
  - difftastic
  - gh
  - git-delta
  - hurl
  - jq
  - lazygit
  - shellcheck
  - tree
  - yq

  # Infra & automation
  - ansible
  - mise
  - opentofu

  # Container tools
  - colima
  - docker
  - docker-buildx
  - docker-compose

  # Cloud & infra
  - awscli
  - cloudflared
  - helm
  - kubernetes-cli
  - okta-aws-cli

  # Database
  - libpq
  - postgresql@18

  # JVM tooling
  - coursier

  # Local AI
  - ollama

