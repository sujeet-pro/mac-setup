---
git_user_name: "{{ lookup('env', 'GIT_USER_NAME') }}"

# Single source of truth for org → folder → email mapping.
# Format: CSV of "<github-org>:<folder>:<email>" triples. The FIRST entry is
# the default identity used by commits outside any mapped folder/remote.
#   GIT_ORGS="sujeet-pro:~/personal:sujeet@personal.com,Quince-Engineering:~/work:sujeet@quince.com"
git_orgs_raw: "{{ lookup('env', 'GIT_ORGS') | default('', true) }}"

# Same single SSH key default as the ssh role.
ssh_key: "{{ lookup('env', 'SSH_KEY') | default('id_ed25519', true) }}"
