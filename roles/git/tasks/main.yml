---
- name: Ensure ~/.config/git-configs directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/git-configs"
    state: directory
    mode: "0755"
  tags: [git, gitconfig]

- name: Render .gitconfig from template
  ansible.builtin.template:
    src: gitconfig.j2
    dest: "{{ home_dir }}/.gitconfig"
    mode: "0644"
  tags: [git, gitconfig]

- name: Render allowed signers file for SSH commit signing
  ansible.builtin.template:
    src: allowed_signers.j2
    dest: "{{ home_dir }}/.config/git-configs/allowed_signers"
    mode: "0644"
  tags: [git, gitconfig, signing]

# --- Per-org gitconfigs (one file per GIT_ORGS entry) ---

- name: Render per-org gitconfigs
  ansible.builtin.template:
    src: gitconfig-org.j2
    dest: "{{ home_dir }}/.config/git-configs/{{ org.name }}.gitconfig"
    mode: "0644"
  vars:
    org:
      name: "{{ entry.split(':')[0] | trim }}"
      folder: "{{ entry.split(':')[1] | trim }}"
      email: "{{ entry.split(':')[2] | trim }}"
  loop: "{{ git_orgs_raw.split(',') | map('trim') | select | list }}"
  loop_control:
    loop_var: entry
    label: "{{ entry.split(':')[0] | trim }}.gitconfig"
  when: (entry.split(':') | length) == 3
  tags: [git, gitconfig]

# --- Cleanup of pre-multi-org artifacts ---

- name: Remove legacy gitconfig files from home directory
  ansible.builtin.file:
    path: "{{ home_dir }}/{{ item }}"
    state: absent
  loop:
    - .gitconfig-personal
    - .gitconfig-work
    - .gitignore-work
  tags: [git, gitconfig, cleanup]

- name: Remove legacy work.gitconfig + personal.gitconfig + symlinks
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/git-configs/{{ item }}"
    state: absent
  loop:
    - work.gitconfig
    - personal.gitconfig
  tags: [git, gitconfig, cleanup]

# --- Global pre-commit hook ---

- name: Ensure ~/.git-hooks directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.git-hooks"
    state: directory
    mode: "0755"
  tags: [git, gitconfig, githooks]

- name: Symlink global pre-commit hook
  ansible.builtin.file:
    src: "{{ repo_dir }}/configs/git/hooks/pre-commit"
    dest: "{{ home_dir }}/.git-hooks/pre-commit"
    state: link
    force: true
  tags: [git, gitconfig, githooks]
