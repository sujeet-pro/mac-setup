---
- name: Symlink .zshrc
  ansible.builtin.file:
    src: "{{ repo_dir }}/configs/shell/.zshrc"
    dest: "{{ home_dir }}/.zshrc"
    state: link
    force: true
  tags: [shell, zshrc]

- name: Create .zprofile for Homebrew init
  ansible.builtin.copy:
    dest: "{{ home_dir }}/.zprofile"
    content: |
      # Initialize Homebrew (must be in .zprofile for login shells)
      eval "$(/opt/homebrew/bin/brew shellenv)"
    mode: "0644"
    force: false
  tags: [shell, zprofile]

- name: Ensure .config directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config"
    state: directory
    mode: "0755"
  tags: [shell, starship]

- name: Symlink starship.toml
  ansible.builtin.file:
    src: "{{ repo_dir }}/configs/shell/starship.toml"
    dest: "{{ home_dir }}/.config/starship.toml"
    state: link
    force: true
  tags: [shell, starship]

- name: Require ~/user-synced-data/mac-setup/zshenv to exist
  ansible.builtin.stat:
    path: "{{ home_dir }}/user-synced-data/mac-setup/zshenv"
  register: zshenv_synced
  tags: [shell, zshenv]

- name: Fail if synced zshenv missing
  ansible.builtin.fail:
    msg: "Run scripts/migrate-to-synced.sh first (synced zshenv missing at ~/user-synced-data/mac-setup/zshenv)."
  when: not zshenv_synced.stat.exists
  tags: [shell, zshenv]

- name: Symlink ~/.zshenv → synced zshenv
  ansible.builtin.file:
    src: "{{ home_dir }}/user-synced-data/mac-setup/zshenv"
    dest: "{{ home_dir }}/.zshenv"
    state: link
    force: true
  tags: [shell, zshenv]

- name: Ensure ~/.zshenv.local exists
  ansible.builtin.copy:
    dest: "{{ home_dir }}/.zshenv.local"
    content: "# Per-machine overrides for ~/.zshenv. Never synced.\n"
    mode: '0600'
    force: false
  tags: [shell, zshenv]
