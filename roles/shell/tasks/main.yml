---
- name: Symlink .zshrc
  ansible.builtin.file:
    src: "{{ repo_dir }}/configs/shell/.zshrc"
    dest: "{{ home_dir }}/.zshrc"
    state: link
    force: true
  tags: [shell, zshrc]

- name: Create .zprofile for Homebrew init
  ansible.builtin.copy:
    dest: "{{ home_dir }}/.zprofile"
    content: |
      # Initialize Homebrew (must be in .zprofile for login shells)
      eval "$(/opt/homebrew/bin/brew shellenv)"
    mode: "0644"
    force: false
  tags: [shell, zprofile]

- name: Ensure .config directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config"
    state: directory
    mode: "0755"
  tags: [shell, starship]

- name: Symlink starship.toml
  ansible.builtin.file:
    src: "{{ repo_dir }}/configs/shell/starship.toml"
    dest: "{{ home_dir }}/.config/starship.toml"
    state: link
    force: true
  tags: [shell, starship]

- name: Check if .zshenv exists
  ansible.builtin.stat:
    path: "{{ home_dir }}/.zshenv"
  register: zshenv_check
  tags: [shell, zshenv]

- name: Copy .zshenv.example to ~/.zshenv if missing
  ansible.builtin.copy:
    src: "{{ repo_dir }}/configs/shell/.zshenv.example"
    dest: "{{ home_dir }}/.zshenv"
    mode: "0600"
  when: not zshenv_check.stat.exists
  tags: [shell, zshenv]

- name: Warn user to fill in .zshenv
  ansible.builtin.debug:
    msg: >
      WARNING: ~/.zshenv was just created from the example template.
      Please edit ~/.zshenv and fill in your personal values (name, email, etc.)
      before running the playbook again.
  when: not zshenv_check.stat.exists
  tags: [shell, zshenv]
